name: Optional proof-hardening

on:
  workflow_dispatch:
    inputs:
      skip_mutations:
        description: "Run only focused proof tests, without mutation evidence."
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      proof_timeout_seconds:
        description: "Timeout for the focused proof pytest command."
        required: true
        default: "180"
      mutation_timeout_seconds:
        description: "Per-mutation pytest timeout."
        required: true
        default: "180"

permissions:
  contents: read

jobs:
  proof-hardening:
    name: Run optional proof-hardening evidence
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest
          python -m pip install -e .

      - name: Run proof-hardening check
        run: |
          ARGS=(
            --output-dir artifacts/proof-hardening
            --proof-timeout-seconds "${{ inputs.proof_timeout_seconds }}"
            --mutation-timeout-seconds "${{ inputs.mutation_timeout_seconds }}"
            --python-executable python
          )
          if [ "${{ inputs.skip_mutations }}" = "true" ]; then
            ARGS+=(--skip-mutations)
          fi
          python experiments/proof_hardening_check.py "${ARGS[@]}"

      - name: Upload proof-hardening summary
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: proof-hardening-${{ github.run_id }}
          path: artifacts/proof-hardening
          if-no-files-found: warn
